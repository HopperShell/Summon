<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="400">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff10"/>
      <stop offset="100%" stop-color="#ffffff05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="16" fill="url(#bg)"/>

  <!-- YOU section -->
  <rect x="30" y="140" width="130" height="120" rx="12" fill="url(#card)" stroke="#ffffff15" stroke-width="1"/>
  <text x="95" y="175" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">YOU</text>
  <text x="95" y="210" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="28">📱</text>
  <text x="95" y="240" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Send a message</text>
  <text x="95" y="253" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">or paste an image</text>

  <!-- Chat Apps -->
  <rect x="210" y="90" width="130" height="220" rx="12" fill="url(#card)" stroke="#ffffff15" stroke-width="1"/>
  <text x="275" y="125" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">CHAT APP</text>
  <text x="275" y="165" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12">Slack</text>
  <text x="275" y="195" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12">Discord</text>
  <text x="275" y="225" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12">Telegram</text>
  <text x="275" y="255" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12">WhatsApp</text>
  <rect x="235" y="148" width="80" height="22" rx="6" fill="#611f6915" stroke="#611f6940" stroke-width="1"/>
  <rect x="235" y="178" width="80" height="22" rx="6" fill="#5865f215" stroke="#5865f240" stroke-width="1"/>
  <rect x="235" y="208" width="80" height="22" rx="6" fill="#26a5e415" stroke="#26a5e440" stroke-width="1"/>
  <rect x="235" y="238" width="80" height="22" rx="6" fill="#25d36615" stroke="#25d36640" stroke-width="1"/>

  <!-- Arrow: You -> Chat -->
  <line x1="160" y1="200" x2="208" y2="200" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="206,195 214,200 206,205" fill="#8b5cf6"/>

  <!-- SERVER box -->
  <rect x="400" y="50" width="470" height="300" rx="16" fill="#ffffff06" stroke="#ffffff10" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="635" y="82" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" letter-spacing="2">YOUR SERVER</text>

  <!-- Summon -->
  <rect x="430" y="140" width="160" height="120" rx="12" fill="url(#card)" stroke="#6366f140" stroke-width="1"/>
  <rect x="430" y="140" width="160" height="3" rx="1" fill="url(#accent)"/>
  <text x="510" y="180" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Summon</text>
  <text x="510" y="205" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Routes messages</text>
  <text x="510" y="220" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Streams responses</text>
  <text x="510" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Manages sessions</text>

  <!-- Arrow: Chat -> Summon -->
  <line x1="340" y1="200" x2="428" y2="200" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="426,195 434,200 426,205" fill="#8b5cf6"/>
  <text x="384" y="192" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">bot API</text>

  <!-- Claude Code CLI -->
  <rect x="660" y="140" width="180" height="120" rx="12" fill="url(#card)" stroke="#10b98140" stroke-width="1"/>
  <rect x="660" y="140" width="180" height="3" rx="1" fill="url(#green)"/>
  <text x="750" y="180" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Claude Code CLI</text>
  <text x="750" y="205" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">claude -p</text>
  <text x="750" y="228" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Reads, edits, runs</text>
  <text x="750" y="243" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">commands on your code</text>

  <!-- Arrow: Summon -> Claude -->
  <line x1="590" y1="190" x2="658" y2="190" stroke="url(#green)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="656,185 664,190 656,195" fill="#34d399"/>
  <text x="624" y="183" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">prompt</text>

  <!-- Arrow: Claude -> Summon -->
  <line x1="658" y1="210" x2="590" y2="210" stroke="url(#orange)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="592,205 584,210 592,215" fill="#fbbf24"/>
  <text x="624" y="226" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">stream</text>

  <!-- Powered by label -->
  <text x="750" y="285" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="10">Powered by your Claude Max sub</text>
  <text x="750" y="298" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="10">No API keys needed</text>

  <!-- Return arrow: Summon -> Chat -->
  <path d="M 430 230 Q 385 280 340 230" stroke="url(#orange)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <polygon points="342,233 336,228 344,226" fill="#fbbf24"/>
  <text x="384" y="272" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">reply</text>
</svg>
